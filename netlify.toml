[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOW-FROM https://www.pronormusa.com"
    Content-Security-Policy = "frame-ancestors 'self' https://www.pronormusa.com https://pronormusa.com https://estimator.pronormusa.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
